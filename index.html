<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackSuperman Youth Training</title>
<style>
body{margin:0;background:#08080a;color:#fff;font-family:Arial;padding:12px}
.app{max-width:760px;margin:auto}
.card{background:#17171b;border-radius:20px;padding:14px;margin-bottom:12px}
button{border:0;border-radius:12px;padding:12px;font-weight:900;background:#facc15;color:#000;width:100%}
.locked{opacity:.4}
</style>
</head>
<body>
<div class="app">

<h1>BlackSuperman Youth Training</h1>

<div class="card">
<h3 id="weekTitle">Week 1</h3>
<p id="dayTitle">Monday</p>
<p id="stepText"></p>
<button onclick="completeStep()">Complete Step</button>
</div>

</div>

<script>
const program = {
  "Week 1": {
    days: {
      Monday: ["Warm up", "Sprint work", "Ladder drills"],
      Tuesday: ["Warm up", "Agility", "Recovery"]
    }
  },
  "Week 2": {
    days: {
      Monday: ["Advanced warm up", "Speed work", "Explosive drills"],
      Tuesday: ["Advanced agility", "Reaction drills"]
    }
  }
}

let week = localStorage.getItem("week") || "Week 1"
let day = localStorage.getItem("day") || "Monday"
let step = Number(localStorage.getItem("step") || 0)
let completed = JSON.parse(localStorage.getItem("completed") || "{}")

function key(){return week+"|"+day+"|"+step}

function completeStep(){
  completed[key()] = true
  if(step < program[week].days[day].length -1){
    step++
  } else {
    step = 0
    if(week === "Week 1") week = "Week 2"
  }
  save()
  render()
}

function save(){
  localStorage.setItem("week",week)
  localStorage.setItem("day",day)
  localStorage.setItem("step",step)
  localStorage.setItem("completed",JSON.stringify(completed))
}

function render(){
  document.getElementById("weekTitle").innerText = week
  document.getElementById("dayTitle").innerText = day
  document.getElementById("stepText").innerText = program[week].days[day][step]
}

render()
</script>

</body>
</html>
